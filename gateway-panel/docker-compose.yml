services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oneshield_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - oneshield
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: oneshield_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oneshield
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: oneshield_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-oneshield}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_USER: ${DB_USERNAME:-oneshield}
      MYSQL_PASSWORD: ${DB_PASSWORD:-oneshield_secret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - oneshield

  redis:
    image: redis:7-alpine
    container_name: oneshield_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - oneshield

  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oneshield_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www
    networks:
      - oneshield
    depends_on:
      - db
      - redis

networks:
  oneshield:
    driver: bridge

volumes:
  db_data:
    driver: local
